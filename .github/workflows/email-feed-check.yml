name: email-feed-check
# Server-side backstop for the Kit newsletter safety gate (defense-in-depth on top of
# the local pre-push hook). Builds the site and runs the validator. Check-only: it does
# NOT deploy — GitHub Pages still builds/deploys the site itself. A red check means the
# email feed is unsafe or the emailable set changed without being approved (--bless).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      # Resolve deps fresh: the committed Gemfile.lock is generated by the
      # github-pages gem on other platforms/bundler versions and drifts on CI
      # runners (e.g. listen dep mismatch). A check-only job doesn't need the
      # pinned lock — it just needs Jekyll to build and Nokogiri to load.
      - name: Install dependencies
        run: rm -f Gemfile.lock && bundle install --jobs 4
      - name: Build site
        run: bundle exec jekyll build
      - name: Validate email feed
        run: bundle exec ruby scripts/check-email-feed.rb
