---
layout: default
---
<article class="page{% if page.marginalia == 'circles' %} page--circles{% endif %}">
  {% if page.marginalia == 'circles' %}{% include circle-marginalia.html %}{% endif %}
  <header class="page-head">
    <div class="wrap">
      {% if page.eyebrow %}<span class="eyebrow">{{ page.eyebrow }}</span>{% endif %}
      <h1 class="slab">{{ page.title }}</h1>
      {% if page.dek %}<p class="page-dek">{{ page.dek }}</p>{% endif %}
    </div>
  </header>

  <div class="wrap">
    <div class="prose">
      {{ content }}
    </div>
  </div>
</article>
