# ===================================================================
# Drex blog — letters.drex.style ("the correspondence")
# Chielo's founder/CEO essays + guest writers, in the Drex zine aesthetic.
# GitHub-Pages-native Jekyll build. Only Pages-whitelisted plugins.
# ===================================================================

title: "drex."
tagline: "The correspondence, made public."
description: >-
  The Drex correspondence — founder essays, canon, and lore on
  bringing your gifts into the world together. A place for communion.
author: "Chielo Mbaezue"

url: "https://letters.drex.style"
baseurl: ""

lang: en
timezone: America/Los_Angeles

# Pretty permalinks: /2026/05/the-correspondence/
permalink: /:year/:month/:slug/

# --- markdown / build ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  smart_quotes: ["lsquo", "rsquo", "ldquo", "rdquo"]

# --- collections ---
collections:
  authors:
    output: true
    permalink: /authors/:path/

# --- collections / defaults ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: authors
    values:
      layout: author
  - scope:
      path: ""
    values:
      layout: default

# --- pagination-free home; posts sorted newest-first by Jekyll ---
show_excerpts: false

# --- plugins (all GitHub-Pages-whitelisted) ---
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /feed.xml

# --- Email newsletter feed (Kit RSS-to-email) ---
# A letter appears in /email-feed.xml ONLY if BOTH gates pass:
#   1. its front matter sets `newsletter: true`, AND
#   2. its date is on/after `start_date` below.
# Two independent gates = defense against an accidental send. See PLAN.md Track 0.
# Bump start_date to your real launch date when ready.
email:
  start_date: 2026-06-23

# --- social / SEO ---
social:
  name: "Drex"
  links:
    - https://drex.style
    - https://instagram.com/drexcircles

# --- build hygiene ---
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - PLAN.md
  - FOR-CHIELO.md
  - CLAUDE.md
  - scripts
  - .githooks
  - BRAND-AND-UX.md
  - .jekyll-cache
  - node_modules

sass:
  style: compressed
